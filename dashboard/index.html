<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Argus - Dashboard de Controle</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        panelBg: '#1e293b',
                        userBubble: '#475569',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .markdown-bot p { margin-bottom: 0.75rem; }
        .markdown-bot p:last-child { margin-bottom: 0; }
        .markdown-bot strong { font-weight: 700; color: #93c5fd; }
        .markdown-bot ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-bot ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-bot code { background-color: rgba(0,0,0,0.4); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; color: #e2e8f0; }
        .markdown-bot pre { background-color: rgba(0,0,0,0.5); padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
        .markdown-bot pre code { background-color: transparent; padding: 0; }
        .markdown-bot h1, .markdown-bot h2, .markdown-bot h3 { font-weight: bold; color: #bfdbfe; margin-top: 1rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body class="bg-darkBg text-slate-300 h-screen overflow-hidden flex flex-col font-sans">

    <header class="flex items-center justify-between px-6 py-4 border-b border-slate-700 bg-panelBg shadow-md">
        <div class="flex items-center gap-6">
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                <i class="fa-solid fa-owl text-blue-500"></i> HQ Argus
            </h1>
            <nav class="flex gap-4">
                <button class="bg-slate-700 text-white px-4 py-1 rounded-md text-sm font-medium">Chat de Análise</button>
                <button class="text-slate-400 hover:text-white px-4 py-1 text-sm transition">Meu Perfil</button>
                <button class="text-slate-400 hover:text-white px-4 py-1 text-sm transition">Configurações</button>
            </nav>
        </div>
        <div class="flex items-center gap-3">
            <span class="flex h-2 w-2 rounded-full bg-green-500"></span>
            <span class="text-xs font-mono text-slate-400">SERVER ONLINE: 192.168.1.200</span>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-4 gap-4">
        
        <section class="flex-1 flex flex-col bg-panelBg rounded-xl border border-slate-700 overflow-hidden shadow-2xl">
            
            <div id="chatWindow" class="flex-1 overflow-y-auto p-6 flex flex-col gap-6">
                <div class="flex gap-4 max-w-3xl mb-2">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center flex-shrink-0 mt-1 shadow-md text-white font-bold text-xs">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div>
                        <span class="text-[10px] text-slate-500 font-bold mb-1 block">ARGUS</span>
                        <div class="bg-gradient-to-r from-blue-900 to-indigo-900 rounded-r-xl rounded-bl-xl border border-blue-800/30 text-white p-4 shadow-sm text-sm">
                            <p>Sistemas operantes, Leo. Motor RAG, Standby e NLP em linha. O que vamos estudar ou executar hoje?</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="px-6 py-2 border-t border-slate-700 flex items-center gap-6 text-xs font-bold text-slate-500 bg-slate-800/50 overflow-x-auto scrollbar-hide">
                <span class="tracking-widest opacity-50">CONEXÃO:</span>
                <button id="btnNuvem" class="text-blue-400 flex items-center gap-2 transition hover:text-blue-300 whitespace-nowrap">
                    <i class="fa-solid fa-cloud"></i> CÉREBRO (IA)
                </button>
                <button id="btnDebian" class="text-slate-500 flex items-center gap-2 transition hover:text-green-400 whitespace-nowrap">
                    <i class="fa-solid fa-server"></i> DEBIAN (LOCAL)
                </button>
                <button id="btnSnippet" class="text-slate-500 flex items-center gap-2 transition hover:text-yellow-400 whitespace-nowrap">
                    <i class="fa-solid fa-code"></i> SALVAR SNIPPET
                </button>
                <button id="btnAprender" class="text-slate-500 flex items-center gap-2 transition hover:text-purple-400 whitespace-nowrap">
                    <i class="fa-solid fa-brain"></i> APRENDER
                </button>
            </div>

            <div class="p-4 bg-panelBg border-t border-slate-700">
                <input type="file" id="fileUpload" accept=".pdf" style="display: none;">
                
                <div class="relative flex items-center bg-slate-800 rounded-lg border border-slate-600 p-1 focus-within:border-blue-500 transition shadow-inner">
                    <button id="btnAnexo" class="p-3 text-slate-400 hover:text-white transition" title="Enviar PDF para estudo">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>
                    <input type="text" id="inputMsg" placeholder="Escreva um comando ou pergunte algo ao Cérebro..." class="flex-1 bg-transparent border-none text-white focus:outline-none p-2 text-sm autocomplete-off">
                    <button id="btnEnviar" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-md transition font-bold text-sm mr-1">ENVIAR</button>
                </div>
            </div>
        </section>

        <aside class="w-80 flex flex-col gap-4 overflow-y-auto">
            
            <div class="bg-panelBg rounded-xl border border-slate-700 p-5 shadow-lg">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Painel do Sistema</h2>
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-slate-700 to-slate-500 flex items-center justify-center text-white text-xl font-bold shadow-md">L</div>
                    <div>
                        <p class="text-white font-bold">Leo</p>
                        <p class="text-[10px] text-blue-400 font-mono uppercase">Admin - Eng. Backend</p>
                    </div>
                </div>
            </div>

            <div class="bg-panelBg rounded-xl border border-slate-700 p-5 shadow-lg flex flex-col">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-6 text-center">Distribuição de Skills</h3>
                <div class="w-full h-56">
                    <canvas id="competencyChart"></canvas>
                </div>
            </div>

        </aside>
    </main>

    <script>
        // --- GRÁFICO (MANTIDO) ---
        const ctx = document.getElementById('competencyChart').getContext('2d');
        Chart.defaults.color = '#64748b';
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Node.js', 'Python', 'SQL', 'Linux', 'Redes', 'Arquitetura'],
                datasets: [{
                    data: [85, 90, 80, 85, 75, 80],
                    backgroundColor: 'rgba(59, 130, 246, 0.2)',
                    borderColor: 'rgba(59, 130, 246, 0.8)',
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: '#3b82f6'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: { ticks: { display: false }, pointLabels: { font: { size: 10 }, color: '#94a3b8' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- WEBSOCKET E CHAT ---
        const socket = io();
        const chatWindow = document.getElementById('chatWindow');
        const inputMsg = document.getElementById('inputMsg');
        const btnEnviar = document.getElementById('btnEnviar');

        marked.setOptions({ breaks: true, gfm: true });

        function appendMessage(texto, user) {
            const div = document.createElement('div');
            const isLeo = user === 'Leo';
            
            div.className = isLeo ? 'flex gap-4 max-w-3xl self-end flex-row-reverse mb-6' : 'flex gap-4 max-w-3xl mb-6';
            const conteudo = isLeo ? `<p>${texto}</p>` : `<div class="markdown-bot">${marked.parse(texto)}</div>`;

            div.innerHTML = `
                <div class="w-8 h-8 rounded-full ${isLeo ? 'bg-slate-600' : 'bg-blue-600'} flex items-center justify-center flex-shrink-0 mt-1 shadow-md text-white font-bold text-xs">
                    ${isLeo ? 'L' : '<i class="fa-solid fa-robot"></i>'}
                </div>
                <div>
                    <span class="text-[10px] text-slate-500 font-bold mb-1 block ${isLeo ? 'text-right' : ''}">${user.toUpperCase()}</span>
                    <div class="${isLeo ? 'bg-userBubble rounded-l-xl rounded-br-xl' : 'bg-gradient-to-r from-blue-900 to-indigo-900 rounded-r-xl rounded-bl-xl border border-blue-800/30'} text-white p-4 shadow-sm text-sm relative">
                        ${conteudo}
                    </div>
                </div>`;
            
            if (!isLeo) {
                const preBlocks = div.querySelectorAll('pre');
                preBlocks.forEach(pre => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'relative group mt-2 mb-4';
                    pre.style.marginBottom = '0';
                    pre.parentNode.insertBefore(wrapper, pre);
                    wrapper.appendChild(pre);

                    const btn = document.createElement('button');
                    btn.className = 'absolute top-2 right-2 bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded text-[10px] font-bold opacity-0 group-hover:opacity-100 transition-opacity z-10 border border-slate-500/50 shadow-md';
                    btn.innerHTML = '<i class="fa-regular fa-copy"></i> COPIAR';
                    
                    btn.onclick = function() {
                        const codeElement = pre.querySelector('code');
                        const textToCopy = codeElement ? codeElement.innerText : pre.innerText;

                        const fallbackCopyTextToClipboard = (text) => {
                            const textArea = document.createElement("textarea");
                            textArea.value = text;
                            document.body.appendChild(textArea);
                            textArea.select();
                            try { document.execCommand('copy'); } catch (err) {}
                            document.body.removeChild(textArea);
                        };

                        if (navigator.clipboard && window.isSecureContext) {
                            navigator.clipboard.writeText(textToCopy).catch(() => fallbackCopyTextToClipboard(textToCopy));
                        } else {
                            fallbackCopyTextToClipboard(textToCopy);
                        }
                        
                        const originalHtml = btn.innerHTML;
                        btn.innerHTML = '<i class="fa-solid fa-check text-green-400"></i> COPIADO!';
                        btn.classList.add('text-green-400');
                        setTimeout(() => {
                            btn.innerHTML = originalHtml;
                            btn.classList.remove('text-green-400');
                        }, 2000);
                    };
                    wrapper.appendChild(btn);
                });
            }

            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function mostrarPensando() {
            if (document.getElementById('argus-thinking')) return;
            const div = document.createElement('div');
            div.id = 'argus-thinking';
            div.className = 'flex gap-4 max-w-3xl mb-6 animate-pulse';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center flex-shrink-0 mt-1 shadow-md text-white font-bold text-xs"><i class="fa-solid fa-robot"></i></div>
                <div>
                    <span class="text-[10px] text-slate-500 font-bold mb-1 block">ARGUS</span>
                    <div class="bg-gradient-to-r from-blue-900 to-indigo-900 rounded-r-xl rounded-bl-xl border border-blue-800/30 text-blue-300 p-4 shadow-sm text-sm flex items-center gap-3">
                        <i class="fa-solid fa-circle-notch fa-spin text-lg"></i> <span class="italic font-medium">Processando...</span>
                    </div>
                </div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function removerPensando() {
            const ind = document.getElementById('argus-thinking');
            if (ind) ind.remove();
        }

        // --- SISTEMA DE ALVOS ---
        let alvoAtual = 'nuvem';
        
        const btnNuvem = document.getElementById('btnNuvem');
        const btnDebian = document.getElementById('btnDebian');
        const btnSnippet = document.getElementById('btnSnippet');
        const btnAprender = document.getElementById('btnAprender'); // NOVO BOTÃO

        function resetarBotoes() {
            btnNuvem.className = 'text-slate-500 flex items-center gap-2 transition hover:text-blue-300 whitespace-nowrap';
            btnDebian.className = 'text-slate-500 flex items-center gap-2 transition hover:text-green-400 whitespace-nowrap';
            btnSnippet.className = 'text-slate-500 flex items-center gap-2 transition hover:text-yellow-400 whitespace-nowrap';
            btnAprender.className = 'text-slate-500 flex items-center gap-2 transition hover:text-purple-400 whitespace-nowrap';
        }

        btnNuvem.onclick = () => {
            alvoAtual = 'nuvem';
            resetarBotoes();
            btnNuvem.className = 'text-blue-400 flex items-center gap-2 transition hover:text-blue-300 whitespace-nowrap';
            inputMsg.placeholder = "Faça uma pergunta ao Cérebro IA (Nuvem ou RAG)...";
        };

        btnDebian.onclick = () => {
            alvoAtual = 'debian';
            resetarBotoes();
            btnDebian.className = 'text-green-400 flex items-center gap-2 transition whitespace-nowrap';
            inputMsg.placeholder = "Digite um comando para o kernel (ex: ram, cpu, status)...";
        };

        btnSnippet.onclick = () => {
            alvoAtual = 'snippet';
            resetarBotoes();
            btnSnippet.className = 'text-yellow-400 flex items-center gap-2 transition whitespace-nowrap';
            inputMsg.placeholder = "Formato Snippet -> Descrição : Comando/Código";
        };

        btnAprender.onclick = () => {
            alvoAtual = 'aprender';
            resetarBotoes();
            btnAprender.className = 'text-purple-400 flex items-center gap-2 transition whitespace-nowrap';
            inputMsg.placeholder = "Formato Rápido -> Tópico : Explicação";
        };

        btnEnviar.onclick = () => {
            const msg = inputMsg.value.trim();
            if(!msg) return;
            
            appendMessage(msg, 'Leo');
            socket.emit('mensagem_web', { texto: msg, alvo: alvoAtual });
            inputMsg.value = '';
            
            // Voltar para a nuvem automaticamente se não for chat comum
            if (alvoAtual === 'snippet' || alvoAtual === 'aprender') {
                btnNuvem.click();
            } else {
                mostrarPensando();
            }
        };

        inputMsg.onkeypress = (e) => { if(e.key === 'Enter') btnEnviar.click(); };

        socket.on('status_argus', (d) => { if(d.status === 'pensando') mostrarPensando(); });
        socket.on('resposta_argus', (dados) => {
            removerPensando();
            appendMessage(dados.texto, 'Argus');
        });

        // --- SISTEMA DE UPLOAD DE PDFs ---
        const btnAnexo = document.getElementById('btnAnexo');
        const fileUpload = document.getElementById('fileUpload');

        btnAnexo.onclick = () => fileUpload.click();

        fileUpload.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            appendMessage(`A preparar documento: **${file.name}**...`, 'Leo');
            mostrarPensando();

            const formData = new FormData();
            formData.append('documento', file);

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const result = await response.json();
                
                removerPensando();
                if (response.ok) {
                    appendMessage(`📄 **Documento na Fila:** \`${file.name}\`\n\n*${result.mensagem}*`, 'Argus');
                } else {
                    appendMessage(`❌ **Erro no Upload:** ${result.erro}`, 'Argus');
                }
            } catch (err) {
                removerPensando();
                appendMessage(`❌ **Falha ao comunicar com o servidor para upload.**`, 'Argus');
                console.error(err);
            }
            fileUpload.value = ''; 
        };
    </script>
</body>
</html>
